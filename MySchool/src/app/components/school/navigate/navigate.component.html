<div class="main-wrapper">

    <app-header [attr.dir]="dir$ | async"></app-header>

    <div [ngClass]="{'page-wrapperEn':(dir$ | async)==='ltr','page-wrapper':(dir$ | async)==='rtl'}" >
        <div class="content container-fluid" dir="ltr"  >
            
            <app-breadcrumb/>
            
            <router-outlet></router-outlet>
        </div>
    </div>

    <app-ai-assistant-floating *ngIf="canUseAiChat" [attr.dir]="(dir$ | async) ?? 'rtl'"></app-ai-assistant-floating>
</div>
