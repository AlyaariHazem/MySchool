<div class="employees-hr-page" *ngIf="canManage">
  <div class="employees-hr-card">
    <header class="employees-hr-header">
      <h2 class="employees-hr-title">
        {{ (editId ? 'dailyEvaluations.templates.editTitle' : 'dailyEvaluations.templates.createTitle') | translate }}
      </h2>
      <p-button [label]="'employeesHr.actions.cancel' | translate" [outlined]="true" (onClick)="cancel()" />
    </header>

    <div *ngIf="loadingEdit" class="loading-wrap">
      <p-progressSpinner strokeWidth="3" />
    </div>

    <form *ngIf="!loadingEdit" [formGroup]="form" (ngSubmit)="submit()" class="filters-grid">
      <p-floatlabel class="filter-field" *ngIf="!editId">
        <p-select
          inputId="dt-school"
          [options]="schoolOptions"
          formControlName="schoolID"
          optionLabel="label"
          optionValue="value"
          [placeholder]="'employeesHr.filter.school' | translate"
        />
        <label for="dt-school">{{ 'employeesHr.filter.school' | translate }} *</label>
      </p-floatlabel>
      <p-floatlabel class="filter-field" *ngIf="!editId">
        <p-select
          inputId="dt-year"
          [options]="yearOptions"
          formControlName="academicYearID"
          optionLabel="label"
          optionValue="value"
        />
        <label for="dt-year">{{ 'employeesHr.filter.year' | translate }} *</label>
      </p-floatlabel>
      <p-floatlabel class="filter-field" *ngIf="!editId">
        <p-select
          inputId="dt-jt"
          [options]="jobTypeOptions"
          formControlName="employeeJobTypeID"
          [showClear]="true"
          optionLabel="label"
          optionValue="value"
        />
        <label for="dt-jt">{{ 'employeesHr.filter.jobType' | translate }}</label>
      </p-floatlabel>

      <p-floatlabel class="filter-field" style="grid-column: 1 / -1">
        <input pInputText id="dt-name" formControlName="name" autocomplete="off" class="w-full" />
        <label for="dt-name">{{ 'dailyEvaluations.templates.colName' | translate }} *</label>
      </p-floatlabel>

      <p-floatlabel class="filter-field" style="grid-column: 1 / -1">
        <textarea pTextarea id="dt-desc" formControlName="description" rows="3" class="w-full"></textarea>
        <label for="dt-desc">{{ 'dailyEvaluations.templates.fieldDescription' | translate }}</label>
      </p-floatlabel>

      <p-floatlabel class="filter-field">
        <p-datepicker inputId="dt-eff-from" formControlName="effectiveFrom" [showIcon]="true" dateFormat="yy-mm-dd" />
        <label for="dt-eff-from">{{ 'dailyEvaluations.templates.effectiveFrom' | translate }}</label>
      </p-floatlabel>
      <p-floatlabel class="filter-field">
        <p-datepicker inputId="dt-eff-to" formControlName="effectiveTo" [showIcon]="true" dateFormat="yy-mm-dd" />
        <label for="dt-eff-to">{{ 'dailyEvaluations.templates.effectiveTo' | translate }}</label>
      </p-floatlabel>

      <div class="filter-field flex align-items-center gap-2">
        <p-inputSwitch formControlName="isDefault" inputId="dt-def" />
        <label for="dt-def">{{ 'dailyEvaluations.templates.isDefault' | translate }}</label>
      </div>
      <div class="filter-field flex align-items-center gap-2" *ngIf="editId">
        <p-inputSwitch formControlName="isActive" inputId="dt-act" />
        <label for="dt-act">{{ 'employeesHr.form.isActive' | translate }}</label>
      </div>

      <small *ngIf="form.errors?.['effectiveRange']" class="error-block" style="grid-column: 1 / -1">
        {{ 'dailyEvaluations.templates.dateError' | translate }}
      </small>

      <div class="filter-actions" style="grid-column: 1 / -1">
        <p-button
          type="submit"
          [label]="'employeesHr.actions.save' | translate"
          icon="pi pi-save"
          [loading]="submitting"
          [disabled]="form.invalid"
        />
      </div>
    </form>
  </div>
</div>

<div class="employees-hr-page" *ngIf="!canManage">
  <div class="employees-hr-card empty-block muted">{{ 'dailyEvaluations.errors.noPermission' | translate }}</div>
</div>
