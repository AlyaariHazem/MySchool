<div class="employees-hr-page" *ngIf="canManage" [class.de-template-form--embedded]="embedded">
  <div class="employees-hr-card" [class.de-template-form-card--embedded]="embedded">
    <header class="employees-hr-header" *ngIf="!embedded">
      <h2 class="employees-hr-title">
        {{ (editId ? 'dailyEvaluations.templates.editTitle' : 'dailyEvaluations.templates.createTitle') | translate }}
      </h2>
      <p-button [label]="'employeesHr.actions.cancel' | translate" [outlined]="true" (onClick)="cancel()" />
    </header>
    <form
      *ngIf="!loadingEdit"
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="filters-grid de-template-form-grid"
      [class.de-template-form-grid--embedded]="embedded"
    >
      <p-floatlabel class="filter-field de-template-form-field" *ngIf="!editId && !isTeacherEvaluations">
        <p-select
          inputId="dt-school"
          styleClass="de-filter-select"
          panelStyleClass="de-filter-select-panel"
          [options]="schoolOptions"
          formControlName="schoolID"
          optionLabel="label"
          optionValue="value"
        />
        <label for="dt-school">{{ 'employeesHr.filter.school' | translate }} *</label>
      </p-floatlabel>
      <p-floatlabel class="filter-field de-template-form-field" *ngIf="!editId">
        <p-select
          inputId="dt-year"
          styleClass="de-filter-select"
          panelStyleClass="de-filter-select-panel"
          [options]="yearOptions"
          formControlName="academicYearID"
          optionLabel="label"
          optionValue="value"
        />
        <label for="dt-year">{{ 'employeesHr.filter.year' | translate }} *</label>
      </p-floatlabel>
      <p-floatlabel class="filter-field de-template-form-field" *ngIf="!editId">
        <p-select
          inputId="dt-jt"
          styleClass="de-filter-select"
          panelStyleClass="de-filter-select-panel"
          [options]="jobTypeOptions"
          formControlName="employeeJobTypeID"
          [showClear]="true"
          optionLabel="label"
          optionValue="value"
        />
        <label for="dt-jt">{{ 'employeesHr.filter.jobType' | translate }}</label>
      </p-floatlabel>

      <p-floatlabel class="filter-field de-template-form-field de-template-form-field--full" style="grid-column: 1 / -1">
        <input pInputText id="dt-name" formControlName="name" autocomplete="off" class="w-full de-template-form-input" />
        <label for="dt-name">{{ 'dailyEvaluations.templates.colName' | translate }} *</label>
      </p-floatlabel>

      <p-floatlabel class="filter-field de-template-form-field de-template-form-field--full" style="grid-column: 1 / -1">
        <textarea
          pTextarea
          id="dt-desc"
          formControlName="description"
          rows="5"
          class="w-full de-template-form-textarea"
        ></textarea>
        <label for="dt-desc">{{ 'dailyEvaluations.templates.fieldDescription' | translate }}</label>
      </p-floatlabel>

      <div class="de-template-form-dates" style="grid-column: 1 / -1">
        <p-floatlabel class="filter-field de-template-form-field de-template-form-field--grow">
          <p-datepicker
            inputId="dt-eff-from"
            formControlName="effectiveFrom"
            [showIcon]="true"
            dateFormat="yy-mm-dd"
            [appendTo]="'body'"
            styleClass="de-template-form-datepicker"
          />
          <label for="dt-eff-from">{{ 'dailyEvaluations.templates.effectiveFrom' | translate }}</label>
        </p-floatlabel>
        <p-floatlabel class="filter-field de-template-form-field de-template-form-field--grow">
          <p-datepicker
            inputId="dt-eff-to"
            formControlName="effectiveTo"
            [showIcon]="true"
            dateFormat="yy-mm-dd"
            [appendTo]="'body'"
            styleClass="de-template-form-datepicker"
          />
          <label for="dt-eff-to">{{ 'dailyEvaluations.templates.effectiveTo' | translate }}</label>
        </p-floatlabel>
      </div>

      <div class="de-template-form-toggles" style="grid-column: 1 / -1">
        <div class="de-template-form-toggle">
          <p-inputSwitch formControlName="isDefault" inputId="dt-def" />
          <label for="dt-def">{{ 'dailyEvaluations.templates.isDefault' | translate }}</label>
        </div>
        <div class="de-template-form-toggle" *ngIf="editId">
          <p-inputSwitch formControlName="isActive" inputId="dt-act" />
          <label for="dt-act">{{ 'employeesHr.form.isActive' | translate }}</label>
        </div>
      </div>

      <small *ngIf="form.errors?.['effectiveRange']" class="error-block" style="grid-column: 1 / -1">
        {{ 'dailyEvaluations.templates.dateError' | translate }}
      </small>

      <div class="filter-actions de-template-form-actions" style="grid-column: 1 / -1">
        <p-button
          *ngIf="embedded"
          type="button"
          [label]="'employeesHr.actions.cancel' | translate"
          [outlined]="true"
          (onClick)="cancel()"
        />
        <p-button
          type="submit"
          [label]="'employeesHr.actions.save' | translate"
          icon="pi pi-save"
          [loading]="submitting"
          [disabled]="form.invalid"
        />
      </div>
    </form>
  </div>
</div>

<div class="employees-hr-page" *ngIf="!canManage">
  <div class="employees-hr-card empty-block muted">{{ 'dailyEvaluations.errors.noPermission' | translate }}</div>
</div>
