<section class="ai-page">
  <header class="ai-page__header">
    <h1 class="ai-page__title">{{ title }}</h1>
    <p class="ai-page__sub">{{ subtitle }}</p>
  </header>

  <div class="ai-page__quick">
    <span class="ai-page__quick-label">{{ 'aiAssistant.quickExamples' | translate }}</span>
    <div class="ai-page__chips">
      <button
        type="button"
        class="ai-chip"
        *ngFor="let q of quickPrompts"
        (click)="onQuick(q.key)"
        [disabled]="loading"
      >
        {{ q.key | translate }}
      </button>
    </div>
  </div>

  <app-ai-chat-panel
    [messages]="uiMessages"
    [loading]="loading"
    [inputPlaceholder]="inputPlaceholder"
    [sendLabel]="sendLabel"
    (send)="onSend($event)"
  ></app-ai-chat-panel>
</section>
