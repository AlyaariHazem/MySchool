<div id="attendance-page" [attr.dir]="(dir$ | async)" class="attendance-page">
  <div class="attendance-card">
    <header class="attendance-header">
      <h2 class="attendance-title">{{ 'attendance.pageTitle' | translate }}</h2>
    </header>

    <div class="filters-toolbar">
      <form [formGroup]="filterForm" class="filters-grid" novalidate>
        <div class="filter-field">
          <p-floatLabel class="w-full block" variant="on">
            <p-select
              inputId="attendance-class"
              class="w-full"
              styleClass="w-full attendance-filter-control"
              size="small"
              [options]="classes"
              formControlName="classId"
              optionLabel="className"
              optionValue="classID"
              [showClear]="true"
              panelStyleClass="attendance-select-panel"
              placeholder=" " />
            <label for="attendance-class">{{ 'attendance.class' | translate }}</label>
          </p-floatLabel>
        </div>

        <div class="filter-field">
          <p-floatLabel class="w-full block" variant="on">
            <p-select
              inputId="attendance-division"
              class="w-full"
              styleClass="w-full attendance-filter-control"
              size="small"
              [options]="filteredDivisions"
              formControlName="divisionId"
              optionLabel="divisionName"
              optionValue="divisionID"
              [showClear]="true"
              panelStyleClass="attendance-select-panel"
              placeholder=" " />
            <label for="attendance-division">{{ 'attendance.division' | translate }}</label>
          </p-floatLabel>
        </div>

        <div class="filter-field filter-field--date">
          <p-floatLabel class="w-full block" variant="on">
            <p-datepicker
              inputId="attendance-date"
              formControlName="date"
              dateFormat="yy-mm-dd"
              [showIcon]="true"
              size="small"
              styleClass="w-full attendance-filter-control"
              appendTo="body" />
            <label for="attendance-date">{{ 'attendance.date' | translate }}</label>
          </p-floatLabel>
        </div>
      </form>

      <div class="toolbar-actions">
        <p-button
          type="button"
          [label]="'attendance.loadRoster' | translate"
          icon="pi pi-refresh"
          [outlined]="true"
          [loading]="isLoading"
          (onClick)="loadRoster()" />
        <p-button
          type="button"
          [label]="'attendance.save' | translate"
          icon="pi pi-save"
          severity="success"
          [loading]="saving"
          [disabled]="rows.length === 0"
          (onClick)="saveBulk()" />
      </div>
    </div>

    <div class="table-wrap">
      <p-table
        [value]="rows"
        [loading]="isLoading"
        [tableStyle]="{ 'min-width': '100%' }"
        styleClass="p-datatable-sm attendance-table">
        <ng-template pTemplate="header">
          <tr>
            <th class="col-student">{{ 'attendance.col.student' | translate }}</th>
            <th class="col-status">{{ 'attendance.col.status' | translate }}</th>
            <th class="col-remarks">{{ 'attendance.col.remarks' | translate }}</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
          <tr>
            <td class="col-student">{{ row.studentName }}</td>
            <td class="col-status">
              <label class="attendance-sr-only" [attr.for]="'attendance-status-' + row.studentID">{{
                'attendance.col.status' | translate
              }}</label>
              <select
                class="attendance-table-status-native w-full"
                [id]="'attendance-status-' + row.studentID"
                [attr.title]="'attendance.col.status' | translate"
                [attr.aria-label]="'attendance.col.status' | translate"
                [(ngModel)]="row.status">
                <option *ngFor="let opt of statusOptions" [ngValue]="opt.value">{{ opt.label }}</option>
              </select>
            </td>
            <td class="col-remarks">
              <label class="attendance-sr-only" [attr.for]="'attendance-remarks-' + row.studentID">{{
                'attendance.col.remarks' | translate
              }}</label>
              <input
                pInputText
                class="w-full attendance-remarks-input"
                [id]="'attendance-remarks-' + row.studentID"
                [attr.title]="'attendance.col.remarks' | translate"
                [attr.aria-label]="'attendance.col.remarks' | translate"
                [(ngModel)]="row.remarks" />
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="3" class="empty-cell">{{ 'attendance.empty' | translate }}</td>
          </tr>
        </ng-template>
      </p-table>
    </div>

    <p-paginator
      *ngIf="totalRecords > 0"
      class="attendance-paginator"
      [rows]="pageSize"
      [totalRecords]="totalRecords"
      [first]="first"
      [rowsPerPageOptions]="[10, 25, 50, 100]"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first} - {last} / {totalRecords}"
      (onPageChange)="onStudentsPageChange($event)" />
  </div>
</div>
