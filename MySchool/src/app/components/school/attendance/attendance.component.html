<div id="attendance-page" [attr.dir]="(dir$ | async)" class="modal-container">
  <div class="modal-content">
    <h2 class="school">{{ 'attendance.pageTitle' | translate }}</h2>

    <div class="container">
      <form [formGroup]="filterForm" class="filters-container">
        <div class="filter-group">
          <p-floatLabel class="w-full" variant="on">
            <p-select
              class="w-full"
              [options]="classes"
              formControlName="classId"
              optionLabel="className"
              optionValue="classID"
              [showClear]="true"
              placeholder=" " />
            <label>{{ 'attendance.class' | translate }}</label>
          </p-floatLabel>
        </div>

        <div class="filter-group">
          <p-floatLabel class="w-full" variant="on">
            <p-select
              class="w-full"
              [options]="filteredDivisions"
              formControlName="divisionId"
              optionLabel="divisionName"
              optionValue="divisionID"
              [showClear]="true"
              placeholder=" " />
            <label>{{ 'attendance.division' | translate }}</label>
          </p-floatLabel>
        </div>

        <div class="filter-group">
          <p-floatLabel class="w-full" variant="on">
            <p-datepicker formControlName="date" dateFormat="yy-mm-dd" [showIcon]="true" styleClass="w-full" />
            <label>{{ 'attendance.date' | translate }}</label>
          </p-floatLabel>
        </div>
      </form>

      <div class="action-buttons">
        <p-button
          [label]="'attendance.loadRoster' | translate"
          icon="pi pi-refresh"
          [loading]="isLoading"
          (onClick)="loadRoster()" />
        <p-button
          [label]="'attendance.save' | translate"
          icon="pi pi-save"
          severity="success"
          [loading]="saving"
          [disabled]="rows.length === 0"
          (onClick)="saveBulk()" />
      </div>
      <p-table [value]="rows" [loading]="isLoading" styleClass="p-datatable-sm attendance-table">
        <ng-template pTemplate="header">
          <tr>
            <th>{{ 'attendance.col.student' | translate }}</th>
            <th style="width: 12rem">{{ 'attendance.col.status' | translate }}</th>
            <th>{{ 'attendance.col.remarks' | translate }}</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
          <tr>
            <td>{{ row.studentName }}</td>
            <td>
              <p-select
                [options]="statusOptions"
                [(ngModel)]="row.status"
                optionLabel="label"
                optionValue="value"
                styleClass="w-full" />
            </td>
            <td>
              <input pInputText class="w-full" [(ngModel)]="row.remarks" />
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="3" class="text-center">{{ 'attendance.empty' | translate }}</td>
          </tr>
        </ng-template>
      </p-table>

      <p-paginator
        *ngIf="totalRecords > 0"
        [rows]="pageSize"
        [totalRecords]="totalRecords"
        [first]="first"
        [rowsPerPageOptions]="[10, 25, 50, 100]"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="{first} - {last} / {totalRecords}"
        (onPageChange)="onStudentsPageChange($event)" />
    </div>
  </div>
</div>
