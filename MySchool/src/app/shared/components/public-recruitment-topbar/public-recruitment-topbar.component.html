<header class="public-recruitment-topbar" [attr.dir]="dir$ | async">
  <div class="public-recruitment-topbar__inner">
    <a routerLink="/school/recruitment/job-postings" class="public-recruitment-topbar__brand">
      <span class="public-recruitment-topbar__brand-icon" aria-hidden="true">
        <i class="pi pi-building"></i>
      </span>
      <div class="public-recruitment-topbar__brand-text">
        <span class="public-recruitment-topbar__brand-title">{{
          'recruitment.jobBoard.publicNavBrandTitle' | translate
        }}</span>
        <span class="public-recruitment-topbar__brand-sub">{{
          'recruitment.jobBoard.publicNavBrandSub' | translate
        }}</span>
      </div>
    </a>

    <nav class="public-recruitment-topbar__nav" [attr.aria-label]="'recruitment.jobBoard.publicNavAria' | translate">
      <div class="public-recruitment-topbar__nav-cluster" role="toolbar">
        <a
          routerLink="/school/recruitment/about"
          routerLinkActive="public-recruitment-topbar__action--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="public-recruitment-topbar__action"
        >
          <i class="pi pi-info-circle" aria-hidden="true"></i>
          <span>{{ 'recruitment.jobBoard.publicNavAbout' | translate }}</span>
        </a>
        <a
          routerLink="/login"
          routerLinkActive="public-recruitment-topbar__action--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="public-recruitment-topbar__action"
        >
          <i class="pi pi-sign-in" aria-hidden="true"></i>
          <span>{{ 'recruitment.jobBoard.publicNavLogin' | translate }}</span>
        </a>
        <a
          routerLink="/school/recruitment/job-postings"
          routerLinkActive="public-recruitment-topbar__action--active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="public-recruitment-topbar__action"
        >
          <i class="pi pi-briefcase" aria-hidden="true"></i>
          <span>{{ 'recruitment.jobBoard.publicNavJobs' | translate }}</span>
        </a>
      </div>
    </nav>
  </div>
</header>
