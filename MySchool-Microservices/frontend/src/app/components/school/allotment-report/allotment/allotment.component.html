<div id="id01" class="container">
    <h2 class="title">تخصيص التقارير</h2>
    <div class="select">
        <p-select 
            [options]="reportOptions" 
            optionLabel="label" 
            [(ngModel)]="selectedReportOption"
            (ngModelChange)="onReportTypeChange()"
            placeholder="Select a report" />
    </div>

    <div class="flex flex-wrap gap-3 save">
        <button 
            class="w-3" 
            pButton 
            type="button" 
            label="حفظ التغييرات" 
            icon="pi pi-save"
            (click)="saveTemplate()"
            [disabled]="isSaving || isLoading">
        </button>
    </div>

    <ng-template #reportContainer></ng-template>

    <div #editorPreview dir="rtl" class="editor-preview-wrap">
        <form [formGroup]="formGroup">
            <p-editor 
                #editor
                formControlName="text" 
                [style]="{ height: '320px' }"
                [readonly]="isLoading"
                (onTextChange)="onEditorTextChange($event)"
                (onInit)="onEditorInit($event)">
            </p-editor>
        </form>
        <div
            *ngIf="mentionOpen && filteredPlaceholderColumns.length"
            class="placeholder-mention-dropdown"
            [style.top.px]="mentionTop"
            [style.left.px]="mentionLeft"
            role="listbox"
            (mousedown)="$event.preventDefault()">
            <button
                type="button"
                *ngFor="let p of filteredPlaceholderColumns; let i = index"
                class="placeholder-mention-item"
                [class.active]="i === mentionHighlightIndex"
                (mousedown)="selectPlaceholder(p)">
                <span class="placeholder-name">#{{ p.name }}#</span>
                <span *ngIf="p.description" class="placeholder-desc">{{ p.description }}</span>
            </button>
        </div>
    </div>
</div>
