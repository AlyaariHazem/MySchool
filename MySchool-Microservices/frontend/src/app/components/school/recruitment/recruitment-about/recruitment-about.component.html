<div class="employees-hr-page recruitment-about">

    <header class="employees-hr-header recruitment-about__header">
      <h2 class="employees-hr-title">{{ 'recruitment.jobBoard.aboutPageTitle' | translate }}</h2>
      <p-button
        [label]="'recruitment.jobBoard.publicNavJobs' | translate"
