<div class="employees-hr-page">
  <div class="employees-hr-card">
    <header class="employees-hr-header">
      <h2 class="employees-hr-title">{{ 'employeesHr.create.title' | translate }}</h2>
      <p-button [label]="'employeesHr.actions.backList' | translate" icon="pi pi-arrow-right" [outlined]="true" routerLink="/school/employees-hr" />
    </header>

    <div *ngIf="!canCreate" class="empty-block muted">{{ 'employeesHr.errors.noPermission' | translate }}</div>

    <app-employees-hr-profile-form
      *ngIf="canCreate"
      [initial]="null"
      [submitting]="submitting"
      [submitLabelKey]="'employeesHr.create.submit'"
      (submitted)="onSubmit($event)"
      (cancelled)="cancel()"
    />
  </div>
</div>
