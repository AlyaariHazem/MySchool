<div class="main-wrapper">
  <app-header [teacherPortal]="true" [attr.dir]="dir$ | async"></app-header>

  <div
    [ngClass]="{
      'page-wrapperEn': (dir$ | async) === 'ltr',
      'page-wrapper': (dir$ | async) === 'rtl'
    }"
  >
    <div class="content container-fluid" [attr.dir]="(dir$ | async) ?? 'rtl'">
      <app-breadcrumb />
      <router-outlet />
    </div>
  </div>
</div>
