services:
  sqlserver:
    # Match the SQL Server version used to produce .bak files (e.g. SSMS / SQL 2025 on the host). 2022 cannot restore 2025 backups.
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      # English: do not fallback to a default password (fail if missing)
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD is required}"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      # Same files must be visible to sqlserver (RESTORE) and backend (upload). Nested mount overrides this path inside sql_data.
      - sql_backups:/var/opt/mssql/backup
    healthcheck:
      # Use sqlcmd for reliability (log text/paths can vary by image/version).
      test: ["CMD-SHELL", "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -d master -Q 'SELECT 1' -o /dev/null; elif [ -x /opt/mssql-tools/bin/sqlcmd ]; then /opt/mssql-tools/bin/sqlcmd -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -d master -Q 'SELECT 1' -o /dev/null; else exit 1; fi"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  backend:
    build:
      # Build from the Backend/ folder so Dockerfile can copy Backend/*.csproj correctly.
      context: ./Backend
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__SqlAdminConnection: "Server=sqlserver,1433;Database=MySchool;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__TenantDesignTime: "Server=sqlserver,1433;Database=MySchool;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ASPNETCORE_URLS: "http://+:8080"
      # Shared with sqlserver volume sql_backups — RESTORE must read the same path inside the SQL container.
      SqlRestore__HostBackupRoot: "/var/opt/mssql/backup"
      SqlRestore__UseContainerPathForRestoreDisk: "false"
      SqlRestore__SqlServerDataPath: "/var/opt/mssql/data/"
    volumes:
      - sql_backups:/var/opt/mssql/backup
    ports:
      - "8080:8080"

  frontend:
    image: node:20-bookworm
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./MySchool:/app
      - frontend_node_modules:/app/node_modules
    environment:
      # Reliable file watching when the app directory is a bind mount (e.g. Docker Desktop on Windows).
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200 --configuration development"

volumes:
  sql_data:
  sql_backups:
  frontend_node_modules:
